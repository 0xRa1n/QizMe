name: flutter_application_1
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  pinput: ^6.0.2
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/fonts/

  fonts:
  - family: AlbertSans
    fonts:
      - asset: assets/fonts/AlbertSans-Regular.ttf

  - family: YoungSerif
    fonts:
      - asset: assets/fonts/YoungSerif-Regular.ttf